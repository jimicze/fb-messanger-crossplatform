<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Settings — Messenger X</title>
  <link rel="stylesheet" href="settings.css" />
</head>
<body>
  <div id="settings">
    <h1>Settings</h1>

    <div class="setting-group">
      <h2>Account</h2>
      <label class="setting-row">
        <span>Stay logged in</span>
        <div class="toggle-switch">
          <input type="checkbox" id="stay-logged-in" checked />
          <span class="toggle-slider"></span>
        </div>
      </label>
    </div>

    <div class="setting-group">
      <h2>Notifications</h2>
      <label class="setting-row">
        <span>Enable notifications</span>
        <div class="toggle-switch">
          <input type="checkbox" id="notifications-enabled" checked />
          <span class="toggle-slider"></span>
        </div>
      </label>
      <label class="setting-row">
        <span>Notification sound</span>
        <div class="toggle-switch">
          <input type="checkbox" id="notification-sound" checked />
          <span class="toggle-slider"></span>
        </div>
      </label>
    </div>

    <div class="setting-group">
      <h2>Display</h2>
      <div class="setting-row">
        <span>Zoom Level</span>
        <div class="zoom-controls">
          <button id="zoom-out" class="zoom-btn">&#x2212;</button>
          <span id="zoom-level">100%</span>
          <button id="zoom-in" class="zoom-btn">+</button>
        </div>
      </div>
    </div>

    <div class="setting-group">
      <h2>Startup</h2>
      <label class="setting-row">
        <span>Start at login</span>
        <div class="toggle-switch">
          <input type="checkbox" id="autostart" />
          <span class="toggle-slider"></span>
        </div>
      </label>
      <label class="setting-row">
        <span>Start minimized to tray</span>
        <div class="toggle-switch">
          <input type="checkbox" id="start-minimized" />
          <span class="toggle-slider"></span>
        </div>
      </label>
    </div>

    <div class="setting-group">
      <h2>Data</h2>
      <button id="logout-btn" class="danger-btn">Log out &amp; clear all data</button>
      <p class="hint">This will clear your session, cached data, and all settings.</p>
    </div>

    <div class="setting-group">
      <h2>Updates</h2>
      <div id="update-status" class="update-status"></div>
      <button id="check-update-btn" class="action-btn">Check for updates</button>
      <button id="install-update-btn" class="action-btn primary-btn" style="display:none;">Install &amp; Restart</button>
    </div>

    <div class="setting-group">
      <h2>About</h2>
      <p class="version">Messenger X</p>
      <p class="hint">Cross-platform Messenger client built with Tauri.</p>
    </div>
  </div>

  <script>
    // Settings window logic.
    // Uses window.__TAURI__ directly — no ES module imports — so this works
    // on all platforms (WebView2 on Windows enforces strict MIME types for
    // .ts files and rejects dynamic imports of bare module specifiers without
    // a bundler).

    (function () {
      'use strict';

      let invoke = null;
      let translations = {};
      let pendingUpdateVersion = null;

      // ── Helpers ────────────────────────────────────────────────────────────

      function t(key, fallback) {
        return translations[key] || fallback;
      }

      function applyTranslations() {
        document.title = t('settings_title', 'Settings') + ' \u2014 Messenger X';

        var h1 = document.querySelector('h1');
        if (h1) h1.textContent = t('settings_title', 'Settings');

        document.querySelectorAll('h2').forEach(function (el) {
          switch (el.textContent.trim()) {
            case 'Account':       el.textContent = t('settings_account',       'Account');       break;
            case 'Notifications': el.textContent = t('settings_notifications', 'Notifications'); break;
            case 'Display':       el.textContent = t('settings_display',       'Display');       break;
            case 'Startup':       el.textContent = t('settings_startup',       'Startup');       break;
            case 'Data':          el.textContent = t('settings_data',          'Data');          break;
            case 'Updates':       el.textContent = t('settings_updates',       'Updates');       break;
            case 'About':         el.textContent = t('settings_about',         'About');         break;
          }
        });

        var stayLabel = document.querySelector('label.setting-row span');
        if (stayLabel) stayLabel.textContent = t('settings_stay_logged_in', 'Stay logged in');

        var zoomLabel = document.querySelector('div.setting-row span');
        if (zoomLabel) zoomLabel.textContent = t('settings_zoom_level', 'Zoom Level');

        var logoutEl = document.querySelector('.danger-btn');
        if (logoutEl) logoutEl.textContent = t('settings_logout', 'Log out & clear all data');

        var hints = document.querySelectorAll('.hint');
        if (hints[0]) hints[0].textContent = t('settings_logout_hint', 'This will clear your session, cached data, and all settings.');
        if (hints[1]) hints[1].textContent = t('settings_about_description', 'Cross-platform Messenger client built with Tauri.');

        var checkBtn = document.getElementById('check-update-btn');
        if (checkBtn) checkBtn.textContent = t('settings_check_update', 'Check for updates');

        // Notification labels
        const notifEnabledEl = document.querySelector('#notifications-enabled');
        if (notifEnabledEl) {
          const labelEl = notifEnabledEl.closest('label');
          if (labelEl) {
            const span = labelEl.querySelector('span:first-child');
            if (span) span.textContent = t('settings_notifications_enabled', 'Enable notifications');
          }
        }
        const notifSoundEl = document.querySelector('#notification-sound');
        if (notifSoundEl) {
          const labelEl = notifSoundEl.closest('label');
          if (labelEl) {
            const span = labelEl.querySelector('span:first-child');
            if (span) span.textContent = t('settings_notification_sound', 'Notification sound');
          }
        }

        // Startup labels
        const autostartEl = document.querySelector('#autostart');
        if (autostartEl) {
          const labelEl = autostartEl.closest('label');
          if (labelEl) {
            const span = labelEl.querySelector('span:first-child');
            if (span) span.textContent = t('settings_autostart', 'Start at login');
          }
        }
        const minimizedEl = document.querySelector('#start-minimized');
        if (minimizedEl) {
          const labelEl = minimizedEl.closest('label');
          if (labelEl) {
            const span = labelEl.querySelector('span:first-child');
            if (span) span.textContent = t('settings_start_minimized', 'Start minimized to tray');
          }
        }
      }

      // ── Init ───────────────────────────────────────────────────────────────

      async function init() {
        // window.__TAURI__ is injected by the Tauri runtime for local windows.
        if (!window.__TAURI__ || !window.__TAURI__.core) {
          console.error('[Settings] Tauri IPC not available');
          return;
        }
        invoke = window.__TAURI__.core.invoke;

        // Translations
        try {
          translations = await invoke('get_translations');
          applyTranslations();
        } catch (e) {
          console.error('[Settings] Failed to load translations:', e);
        }

        // Current settings
        let settings;
        try {
          settings = await invoke('get_settings');
        } catch (e) {
          console.error('[Settings] Failed to load settings:', e);
          return;
        }

        const stayCheckbox   = document.getElementById('stay-logged-in');
        const zoomDisplay    = document.getElementById('zoom-level');
        const zoomInBtn      = document.getElementById('zoom-in');
        const zoomOutBtn     = document.getElementById('zoom-out');
        const logoutBtn      = document.getElementById('logout-btn');
        const checkUpdateBtn = document.getElementById('check-update-btn');
        const installBtn     = document.getElementById('install-update-btn');
        const statusEl       = document.getElementById('update-status');

        stayCheckbox.checked = settings.stay_logged_in;
        zoomDisplay.textContent = Math.round(settings.zoom_level * 100) + '%';

        const notifEnabledCheckbox = document.getElementById('notifications-enabled');
        const notifSoundCheckbox   = document.getElementById('notification-sound');
        const autostartCheckbox    = document.getElementById('autostart');
        const startMinCheckbox     = document.getElementById('start-minimized');

        notifEnabledCheckbox.checked = settings.notifications_enabled;
        notifSoundCheckbox.checked = settings.notification_sound;
        startMinCheckbox.checked = settings.start_minimized;

        // Autostart: query actual OS state (may differ from saved setting)
        try {
          const osAutostart = await invoke('is_autostart_enabled');
          autostartCheckbox.checked = osAutostart;
        } catch (e) {
          autostartCheckbox.checked = settings.autostart;
        }

        // ── Stay logged in ──────────────────────────────────────────────────
        stayCheckbox.addEventListener('change', async function () {
          try {
            const s = await invoke('get_settings');
            s.stay_logged_in = stayCheckbox.checked;
            await invoke('save_settings', { settings: s });
          } catch (e) {
            console.error('[Settings] save_settings failed:', e);
          }
        });

        // ── Notifications ───────────────────────────────────────────────────
        notifEnabledCheckbox.addEventListener('change', async function () {
          try {
            const s = await invoke('get_settings');
            s.notifications_enabled = notifEnabledCheckbox.checked;
            await invoke('save_settings', { settings: s });
          } catch (e) {
            console.error('[Settings] save notifications_enabled failed:', e);
          }
        });

        notifSoundCheckbox.addEventListener('change', async function () {
          try {
            const s = await invoke('get_settings');
            s.notification_sound = notifSoundCheckbox.checked;
            await invoke('save_settings', { settings: s });
          } catch (e) {
            console.error('[Settings] save notification_sound failed:', e);
          }
        });

        // ── Zoom ────────────────────────────────────────────────────────────
        zoomInBtn.addEventListener('click', async function () {
          try {
            const s = await invoke('get_settings');
            const newZoom = Math.min(3.0, +(s.zoom_level + 0.1).toFixed(2));
            await invoke('set_zoom', { level: newZoom });
            zoomDisplay.textContent = Math.round(newZoom * 100) + '%';
          } catch (e) {
            console.error('[Settings] set_zoom failed:', e);
          }
        });

        zoomOutBtn.addEventListener('click', async function () {
          try {
            const s = await invoke('get_settings');
            const newZoom = Math.max(0.5, +(s.zoom_level - 0.1).toFixed(2));
            await invoke('set_zoom', { level: newZoom });
            zoomDisplay.textContent = Math.round(newZoom * 100) + '%';
          } catch (e) {
            console.error('[Settings] set_zoom failed:', e);
          }
        });

        // ── Startup ─────────────────────────────────────────────────────────
        autostartCheckbox.addEventListener('change', async function () {
          try {
            await invoke('set_autostart', { enabled: autostartCheckbox.checked });
            const s = await invoke('get_settings');
            s.autostart = autostartCheckbox.checked;
            await invoke('save_settings', { settings: s });
          } catch (e) {
            console.error('[Settings] set_autostart failed:', e);
            // Revert checkbox on failure
            autostartCheckbox.checked = !autostartCheckbox.checked;
          }
        });

        startMinCheckbox.addEventListener('change', async function () {
          try {
            const s = await invoke('get_settings');
            s.start_minimized = startMinCheckbox.checked;
            await invoke('save_settings', { settings: s });
          } catch (e) {
            console.error('[Settings] save start_minimized failed:', e);
          }
        });

        // ── Clear data / logout ─────────────────────────────────────────────
        logoutBtn.addEventListener('click', async function () {
          const msg = t('settings_logout_confirm', 'Are you sure you want to log out and clear all data?');
          if (!confirm(msg)) return;
          try {
            await invoke('clear_all_data');
            window.__TAURI__.window.getCurrentWindow().close();
          } catch (e) {
            console.error('[Settings] clear_all_data failed:', e);
          }
        });

        // ── Updates ─────────────────────────────────────────────────────────
        checkUpdateBtn.addEventListener('click', async function () {
          checkUpdateBtn.disabled = true;
          statusEl.className = 'update-status';
          statusEl.textContent = t('settings_checking', 'Checking\u2026');

          try {
            const version = await invoke('check_for_update');
            if (version) {
              pendingUpdateVersion = version;
              statusEl.textContent = t('settings_update_available', 'Update available: v{}').replace('{}', version);
              statusEl.className = 'update-status info';
              installBtn.style.display = 'block';
              installBtn.textContent = t('settings_install_restart', 'Install & Restart');
            } else {
              statusEl.textContent = t('settings_no_update', "You're up to date!");
              statusEl.className = 'update-status success';
            }
          } catch (e) {
            console.error('[Settings] check_for_update failed:', e);
            statusEl.textContent = t('settings_update_error', 'Update check failed');
            statusEl.className = 'update-status error';
          }
          checkUpdateBtn.disabled = false;
        });

        installBtn.addEventListener('click', async function () {
          if (!pendingUpdateVersion) return;
          installBtn.disabled = true;
          checkUpdateBtn.disabled = true;
          statusEl.textContent = t('settings_update_downloading', 'Downloading update\u2026');
          statusEl.className = 'update-status info';

          try {
            await invoke('install_update');
            statusEl.textContent = t('settings_update_ready', 'Update ready \u2014 restart to apply');
            statusEl.className = 'update-status success';
            // Relaunch via process plugin IPC command
            await invoke('plugin:process|relaunch');
          } catch (e) {
            console.error('[Settings] install_update failed:', e);
            statusEl.textContent = t('settings_update_error', 'Update check failed');
            statusEl.className = 'update-status error';
            installBtn.disabled = false;
            checkUpdateBtn.disabled = false;
          }
        });
      }

      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', init);
      } else {
        init();
      }
    })();
  </script>
</body>
</html>
